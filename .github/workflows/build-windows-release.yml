# Build Mac + Windows installers and publish to GitHub Release on tag push.
# Trigger: push a tag (e.g. v0.1.17, v1.0.0) to create a release with both .dmg and .exe.
name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install web-search skill dependencies
        run: cd SKILLs/web-search && npm install

      - name: Build Windows installer
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install web-search skill dependencies
        run: cd SKILLs/web-search && npm install

      - name: Build Mac installer
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-release
          path: release/*.dmg

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-mac]
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-release

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # Try both flat and nested paths (upload-artifact may preserve or strip 'release/')
          (cp windows-release/*.exe release-assets/ 2>/dev/null || cp windows-release/release/*.exe release-assets/ 2>/dev/null) || true
          (cp mac-release/*.dmg release-assets/ 2>/dev/null || cp mac-release/release/*.dmg release-assets/ 2>/dev/null) || true
          # Fallback: find anywhere under artifact dirs
          find . -path './windows-release*' -name '*.exe' -exec cp {} release-assets/ ';'
          find . -path './mac-release*' -name '*.dmg' -exec cp {} release-assets/ ';'
          echo '--- release-assets ---'
          ls -la release-assets
          echo '--- windows-release ---'
          ls -la windows-release 2>/dev/null || true
          ls -la windows-release/release 2>/dev/null || true
          echo '--- mac-release ---'
          ls -la mac-release 2>/dev/null || true
          ls -la mac-release/release 2>/dev/null || true
          if [ -z "$(ls -A release-assets 2>/dev/null)" ]; then
            echo 'ERROR: release-assets is empty'
            exit 1
          fi

      - name: Create Release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" release-assets/* --clobber
          else
            gh release create "$TAG" release-assets/* --generate-notes
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

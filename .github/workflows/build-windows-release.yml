# Build Mac + Windows installers and publish to GitHub Release on tag push.
# Trigger: push a tag (e.g. v0.1.17, v1.0.0) to create a release with both .dmg and .exe.
name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install web-search skill dependencies
        run: cd SKILLs/web-search && npm install

      - name: Build Windows installer
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install web-search skill dependencies
        run: cd SKILLs/web-search && npm install

      - name: Build Mac installer
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-release
          path: release/*.dmg

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-mac]
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-release/*.exe
            mac-release/*.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

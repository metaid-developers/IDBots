# Build Mac + Windows installers and publish to GitHub Release on tag push.
# Trigger: push a tag (e.g. v0.1.17, v1.0.0) to create a release with both .dmg and .exe.
name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install web-search skill dependencies
        run: cd SKILLs/web-search && npm install

      - name: Build Windows installer
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install web-search skill dependencies
        run: cd SKILLs/web-search && npm install

      - name: Build Mac installer
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-release
          path: release/*.dmg

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-mac]
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-release'
          merge-multiple: true
          path: release-downloads

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # Copy from merged dir (flat or any depth)
          find release-downloads -maxdepth 5 -name '*.exe' -exec cp {} release-assets/ ';'
          find release-downloads -maxdepth 5 -name '*.dmg' -exec cp {} release-assets/ ';'
          echo '--- release-downloads (merged artifacts) ---'
          find release-downloads -type f
          echo '--- release-assets ---'
          ls -la release-assets
          if [ -z "$(ls -A release-assets 2>/dev/null)" ]; then
            echo 'ERROR: no .exe or .dmg found under release-downloads'
            exit 1
          fi

      - name: Create Release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" release-assets/* --clobber
          else
            gh release create "$TAG" release-assets/* --generate-notes
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

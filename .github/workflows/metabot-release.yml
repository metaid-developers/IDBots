name: MetaBot Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'metabot-v*'

permissions:
  contents: write

jobs:
  build-metabot-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Verify metabot package and fixtures
        run: |
          npm --prefix metabot run test
          npm run lint

      - name: Build host skill packs
        run: node scripts/build-metabot-skillpacks.mjs

      - name: Prepare release artifacts
        run: |
          mkdir -p release/metabot
          npm pack ./metabot --pack-destination ./release/metabot
          cp metabot/release/compatibility.json release/metabot/compatibility.json
          tar -czf release/metabot/metabot-skillpack-codex.tar.gz -C metabot/skillpacks codex
          tar -czf release/metabot/metabot-skillpack-claude-code.tar.gz -C metabot/skillpacks claude-code
          tar -czf release/metabot/metabot-skillpack-openclaw.tar.gz -C metabot/skillpacks openclaw

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: metabot-release
          path: release/metabot/*

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/metabot-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/metabot/*.tgz
            release/metabot/*.json
            release/metabot/*.tar.gz
